; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1-n16r8]
platform = espressif32
; platform = https://gh-proxy.org/https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = fatfs
; board_build.filesystem = littlefs
board_build.partitions = zh_pinyin_ffat_partition.csv
